services:
  - type: web
    name: vit-tachyon
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: GDRIVE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: DROPBOX_ACCESS_TOKEN
        sync: false
      - key: ONEDRIVE_CLIENT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
